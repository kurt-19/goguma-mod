pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localProperties = file("local.properties")
        if (localProperties.exists()) {
            localProperties.withInputStream { properties.load(it) }
        }

        def flutterSdkPath = properties.getProperty("flutter.sdk")
            ?: System.getenv("FLUTTER_ROOT")
            ?: System.getenv("FLUTTER_HOME")

        if (flutterSdkPath == null) {
            def pathSeparator = System.getProperty("path.separator")
            def executable = org.gradle.internal.os.OperatingSystem.current().isWindows() ? "flutter.bat" : "flutter"
            flutterSdkPath = System.getenv("PATH")
                ?.split(java.util.regex.Pattern.quote(pathSeparator))
                ?.collect { new File(it, executable) }
                ?.find { it.exists() }
                ?.parentFile
                ?.parent
        }

        assert flutterSdkPath != null : "Flutter SDK not found. Set flutter.sdk in android/local.properties or add Flutter to PATH."
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version '8.11.1' apply false
    id "org.jetbrains.kotlin.android" version "2.2.20" apply false
}

include ":app"
